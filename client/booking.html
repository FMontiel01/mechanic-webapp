<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Service | Mobile Mechanic</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <nav class="navbar">
      <a href="index.html" class="logo">Mobile Mechanic</a>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="booking.html">Book Service</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </nav>
  </header>

  <main class="booking-page">
    <section class="booking-header">
      <h1>Request Mobile Mechanic Service</h1>
      <p>
        Fill out the form below and we will contact you about your vehicle issue.
      </p>
    </section>

    <section class="booking-form-section">
      <form id="bookingForm" class="booking-form">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email">
        </div>

        <div class="form-group">
          <label for="vehicleYear">Vehicle Year</label>
          <input type="number" id="vehicleYear" name="vehicleYear" required>
        </div>

        <div class="form-group">
          <label for="vehicleMake">Vehicle Make</label>
          <input type="text" id="vehicleMake" name="vehicleMake" placeholder="Toyota, Honda, Ford..." required>
        </div>

        <div class="form-group">
          <label for="vehicleModel">Vehicle Model</label>
          <input type="text" id="vehicleModel" name="vehicleModel" required>
        </div>

        <div class="form-group">
          <label for="service">Service Needed</label>
          <select id="service" name="service" required>
            <option value="">Select a service</option>
            <option value="diagnostic">Diagnostic</option>
            <option value="brakes">Brake Repair</option>
            <option value="battery">Battery Replacement</option>
            <option value="oil-change">Oil Change</option>
            <option value="tune-up">Tune-Up</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="zipCode">ZIP Code</label>
          <input type="text" id="zipCode" name="zipCode" required>
        </div>

        <div class="form-group">
          <label for="urgency">How urgent is it?</label>
          <select id="urgency" name="urgency" required>
            <option value="">Select urgency</option>
            <option value="emergency">Emergency</option>
            <option value="same-day">Same Day</option>
            <option value="this-week">This Week</option>
            <option value="not-urgent">Not Urgent</option>
          </select>
        </div>

        <div class="form-group full-width">
          <label for="message">Describe the problem</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>

        <button type="submit" class="btn primary-btn">Submit Request</button>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
